<script>
    let datetxt = "It's 18th July 🥳";
    let charArrDate = datetxt.split('');
    let currentIndex = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");

    setTimeout(function () {
        let timeDatetxt = setInterval(function () {
            if (currentIndex < charArrDate.length) {
                date__of__birth.textContent += charArrDate[currentIndex];
                currentIndex++;
            } else {
                let i = document.createElement("i");
                i.className = "fa-solid fa-star"
                document.querySelector(".date__of__birth").prepend(i.cloneNode(true))
                document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                clearInterval(timeDatetxt)
            }
        }, 100)
    }, 12000)

    let mailBox = document.querySelector('.mail')
    let btnLetter = document.getElementById('btn__letter')
    let boxmail = document.querySelector('.boxMail')
    let closeMailBtn = document.getElementById('closeMail')

    btnLetter.onclick = function (e) {
        e.stopPropagation();
        mailBox.classList.toggle('active')
        boxmail.classList.add('active')
    }

    closeMailBtn.addEventListener('click', function () {
        boxmail.classList.remove('active')
    })

    const prevBtn = document.querySelector('#prev-btn');
    const nextBtn = document.querySelector('#next-btn');
    const pages = document.querySelectorAll('.single-page');
    const indicator = document.querySelector('#current-idx');
    
    let currentPage = 1;
    const totalPages = 7;

    const pageTexts = {
        t1: "Happy 15th Birthday Sejal ❤️🎂🎉🫶🏻✨",
        t2: "More than two and a half years ago, I never imagined that a simple \"Jevan Jhala ka?\" 🍛😂 on Instagram would become one of the most important conversations of my life ❤️.<br><br>Looking back now, it's funny how such a small beginning became such a huge part of my life ✨🤍",
        t3: "You're one of those rare people who genuinely care ❤️. You ask how someone's day was, whether they ate food, how football coaching went — not because you have to, but because that's who you are 🤍.<br><br>Those small things mean everything ✨",
        t4: "After my parents, you're one of the biggest reasons I've kept believing in myself during some of my lowest moments 🥹❤️.<br><br>You believed in me even when I struggled to believe in myself 🤍✨",
        t5: "Thank you for coming into my life ❤️🥹🤍<br><br>You're genuinely the best friend I've ever had. Happy 15th Birthday once again Sejal! ❤️🎂🎉🫶🏻✨"
    };

    function smoothType(elementId, textString) {
        const el = document.getElementById(elementId);
        if(!el) return;
        el.innerHTML = "";

        let html = "";
        let delay = 0;
        
        let parts = textString.split(/(<br><br>)/g);
        
        parts.forEach(part => {
            if(part === "<br><br>") {
                html += "<br><br>";
            } else {
                let words = part.split(" ");
                words.forEach((word, wordIndex) => {
                    html += `<span class="word-wrap">`;
                    
                    let charArray = [...word]; 
                    for (let i = 0; i < charArray.length; i++) {
                        html += `<span class="smooth-letter" style="transition-delay: ${delay}ms;">${charArray[i]}</span>`;
                        delay += 45; 
                    }
                    html += `</span>`;
                    
                    if(wordIndex < words.length - 1) {
                        html += `<span class="smooth-letter space" style="transition-delay: ${delay}ms;"> </span>`;
                        delay += 45;
                    }
                });
            }
        });

        el.innerHTML = html;

        setTimeout(() => {
            el.querySelectorAll('.smooth-letter').forEach(span => {
                span.classList.add('visible');
            });
        }, 50);
    }

    function updatePages() {
        pages.forEach((page) => {
            page.classList.remove('active');
            let textElem = page.querySelector('.type-text');
            if(textElem) textElem.innerHTML = "";
        });

        pages[currentPage - 1].classList.add('active');
        indicator.textContent = currentPage;

        if(currentPage === 2) smoothType('t1', pageTexts.t1);
        if(currentPage === 3) smoothType('t2', pageTexts.t2);
        if(currentPage === 4) smoothType('t3', pageTexts.t3);
        if(currentPage === 5) smoothType('t4', pageTexts.t4);
        if(currentPage === 6) smoothType('t5', pageTexts.t5);
    }

    nextBtn.addEventListener("click", () => {
        if(currentPage < totalPages) {
            currentPage++;
            updatePages();
        }
    });

    prevBtn.addEventListener("click", () => {
        if(currentPage > 1) {
            currentPage--;
            updatePages();
        }
    });
</script>
